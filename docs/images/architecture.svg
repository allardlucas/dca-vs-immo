<line x1="930" y1="500" x2="1000" y2="780" stroke="#c92a2a" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" />
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1e1e1e"/></marker></defs>
<text x="460" y="43.8" font-size="28" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">DCA vs Immobilier - Architecture du comparateur</text>
<text x="210.0" y="107.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">📈 DCA Financier (paramètres)</text>
<text x="60" y="155.3" font-size="18" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">• Apport initial (0-200k)</tspan><tspan x="60" dy="23.400000000000002">• Croissance annuelle (8%)</tspan><tspan x="60" dy="23.400000000000002">• Durée de simulation (15-40ans)</tspan><tspan x="60" dy="23.400000000000002">• Fiscalité: Flat tax 31,4%</tspan><tspan x="60" dy="23.400000000000002">  PEA 18,6% / TMI+PS</text>
<text x="60" y="313.6" font-size="16" fill="#e67700" text-anchor="start" dominant-baseline="auto">⚠️ DCA mensuel désactivé en mode</tspan><tspan x="60" dy="20.8">   'effort égal' → suit le cash-flow</text>
<text x="210.0" y="467.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">🏠 Immobilier Locatif (paramètres)</text>
<text x="55" y="515.3" font-size="18" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">• Prix d'achat (50k-800k)</tspan><tspan x="55" dy="23.400000000000002">• Apport commun (synchro avec DCA)</tspan><tspan x="55" dy="23.400000000000002">• Frais de notaire (8%)</tspan><tspan x="55" dy="23.400000000000002">• Taux crédit (3,5%)</tspan><tspan x="55" dy="23.400000000000002">• Durée crédit (25 ans)</tspan><tspan x="55" dy="23.400000000000002">• Loyer (fixe ou rendement brut)</tspan><tspan x="55" dy="23.400000000000002">• Croissance loyers (2%)</tspan><tspan x="55" dy="23.400000000000002">• Croissance prix (3%)</tspan><tspan x="55" dy="23.400000000000002">• Taxe fonciere / charges</tspan><tspan x="55" dy="23.400000000000002">• Travaux / vacance / gestion</text>
<text x="55" y="815.3" font-size="18" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">Régime fiscal loyers:</tspan><tspan x="55" dy="23.400000000000002">• Micro-foncier (abat. 30%)</tspan><tspan x="55" dy="23.400000000000002">• Reel (nu)</tspan><tspan x="55" dy="23.400000000000002">• Micro-BIC (abat. 50%)</tspan><tspan x="55" dy="23.400000000000002">• Reel LMNP (amort. 80%/25ans</tspan><tspan x="55" dy="23.400000000000002">  + mobilier 10%/7ans)</tspan><tspan x="55" dy="23.400000000000002"></tspan><tspan x="55" dy="23.400000000000002">TMI loyers: 11% ou 30%</text>
<text x="55" y="983.6" font-size="16" fill="#e67700" text-anchor="start" dominant-baseline="auto">🔗 Apport commun DCA + Immo (partage)</text>
<text x="680.0" y="107.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">⚙️ Simulation parallèle (mois par mois)</text>
<text x="455" y="159.6" font-size="16" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">1. Amortissement du crédit (mensualite - interets)</text>
<text x="455" y="229.6" font-size="16" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">2. Revenu loyer (apres vacance locative)</text>
<text x="455" y="299.6" font-size="16" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">3. Deduction des charges (taxe, copro, travaux,</tspan><tspan x="455" dy="20.8">   assurance, gestion) + impot mensuel estime</text>
<text x="455" y="399.6" font-size="16" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">🔑 Cash-flow = Loyer - Credit - Charges - Impot</tspan><tspan x="455" dy="20.8">   → DCA mensuel = max(0, -Cash-flow)   (si besoin)</text>
<text x="455" y="493.6" font-size="16" fill="#6741d9" text-anchor="start" dominant-baseline="auto">DCA s'arrete qd credit rembourse (cash-flow &gt; 0)</tspan><tspan x="455" dy="20.8">Capital DCA continue de croitre seul (8%/an)</tspan><tspan x="455" dy="20.8">Immo calcule plus-value avec abattement 6%/an apres 5 ans</text>
<text x="680.0" y="607.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">📅 Calculs annuels (fin d'annee)</text>
<text x="450" y="643.6" font-size="16" fill="#099268" text-anchor="start" dominant-baseline="auto">• Impot foncier annuel (selon regime: micro/reel/LMNP)</tspan><tspan x="450" dy="20.8">• Amortissement LMNP cumule</tspan><tspan x="450" dy="20.8">• Patrimoine net = Revente - Dette - Frais - Impot + Loyers nets</tspan><tspan x="450" dy="20.8">• Plus-value avec abattement fiscal (19% + PS 17,2%)</text>
<text x="680.0" y="767.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">📊 Fonctions cles du code</text>
<text x="445" y="798.6" font-size="16" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">simuler()       → lecture DOM + rendu UI</tspan><tspan x="445" dy="20.8">runSimulation(p) → calcul pur (sans DOM)</tspan><tspan x="445" dy="20.8">calculerSeuils() → dichotomie (x86 appels)</tspan><tspan x="445" dy="20.8">dessinerEtiquettesEffort() → labels sur canvas</text>
<text x="1210.0" y="107.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">📋 Resultats affiches</text>
<text x="1020" y="145.3" font-size="18" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">• Patrimoine net final DCA (apres impot)</tspan><tspan x="1020" dy="23.400000000000002">• Patrimoine net final Immo (revente)</tspan><tspan x="1020" dy="23.400000000000002">• Gagnant + ecart</tspan><tspan x="1020" dy="23.400000000000002">• Capital verse</tspan><tspan x="1020" dy="23.400000000000002">• Cash-flow moyen</tspan><tspan x="1020" dy="23.400000000000002">• Rendement annualise</tspan><tspan x="1020" dy="23.400000000000002">• Cash-flow mensuel</tspan><tspan x="1020" dy="23.400000000000002">• Recap rapide (notaire, credit, mensualite)</text>
<text x="1020" y="367.0" font-size="20" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">📊 Visualisations</text>
<text x="1005" y="514.45" font-size="17" fill="#1e1e1e" text-anchor="start" dominant-baseline="auto">📈 3 graphiques evolution patrimoine:</tspan><tspan x="1005" dy="22.1">   - Avant impot (brut)</tspan><tspan x="1005" dy="22.1">   - Apres impot (net)</tspan><tspan x="1005" dy="22.1">   - Hors plus-value latente</tspan><tspan x="1005" dy="22.1"></tspan><tspan x="1005" dy="22.1">📉 Graphique effort d'epargne</tspan><tspan x="1005" dy="22.1">   + etiquettes (an 1, 5, 10... fin)</tspan><tspan x="1005" dy="22.1"></tspan><tspan x="1005" dy="22.1">📋 Tableau annee par annee</tspan><tspan x="1005" dy="22.1">   (effort, capital, ecart, gagnant)</text>
<text x="1210.0" y="767.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">🎯 Seuil de rentabilite (NOUVEAU)</text>
<text x="1015" y="809.45" font-size="17" fill="#c92a2a" text-anchor="start" dominant-baseline="auto">Dichotomie (x86 simulations):</tspan><tspan x="1015" dy="22.1"></tspan><tspan x="1015" dy="22.1">🎯 Rendement locatif d'equilibre</tspan><tspan x="1015" dy="22.1">   → Loyer brut necessaire pour que Immo = DCA</tspan><tspan x="1015" dy="22.1"></tspan><tspan x="1015" dy="22.1">📈 Croissance DCA d'equilibre</tspan><tspan x="1015" dy="22.1">   → Rendement annuel necessaire pour que DCA = Immo</text>
<text x="1210.0" y="987.0" font-size="20" fill="#1e1e1e" text-anchor="middle" dominant-baseline="auto">⚠️ Probleme identifie (review)</text>
<text x="1015" y="1019.45" font-size="17" fill="#e67700" text-anchor="start" dominant-baseline="auto">🚩 Duplication de code:</tspan><tspan x="1015" dy="22.1">simuler() et runSimulation() ont chacun leur boucle</tspan><tspan x="1015" dy="22.1">→ Constantes LMNP hardcodees vs variables nommees</tspan><tspan x="1015" dy="22.1">→ Risque de desynchronisation silencieuse</text>
<text x="405.0" y="251.6" font-size="16" fill="#1971c2" text-anchor="middle" dominant-baseline="auto">params</text>
</svg>